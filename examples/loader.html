<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auwla — Router Loader API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── layout ── */
    .shell {
      display: grid;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    /* ── nav bar ── */
    nav {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 24px;
      background: #161b26;
      border-bottom: 1px solid #1e293b;
    }
    nav .brand {
      font-size: 15px;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: -0.02em;
      margin-right: 16px;
    }
    nav a {
      display: inline-flex;
      align-items: center;
      height: 56px;
      padding: 0 12px;
      font-size: 14px;
      color: #94a3b8;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: #e2e8f0; }

    /* ── page content ── */
    main {
      padding: 40px 24px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── cards ── */
    .card {
      background: #161b26;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card + .card { margin-top: 12px; }

    /* ── list ── */
    .post-list { list-style: none; }
    .post-list li {
      border-bottom: 1px solid #1e293b;
      padding: 14px 0;
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list a {
      color: #818cf8;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .post-list a:hover { color: #a5b4fc; }
    .post-list .meta {
      font-size: 12px;
      color: #475569;
      margin-top: 4px;
    }

    /* ── detail ── */
    .detail-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: #f1f5f9;
      margin-bottom: 12px;
      text-transform: capitalize;
    }
    .detail-body {
      font-size: 15px;
      line-height: 1.7;
      color: #94a3b8;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      margin-bottom: 20px;
      text-decoration: none;
      transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { color: #94a3b8; background: #1e293b; }

    /* ── status indicators ── */
    .loader-bar {
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #6366f1);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.2s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .status-badge.pending  { background: #1e2a4a; color: #818cf8; }
    .status-badge.error    { background: #2d1515; color: #f87171; }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }
    .page-sub {
      font-size: 14px;
      color: #475569;
      margin-bottom: 28px;
    }

    .not-found {
      text-align: center;
      padding: 80px 0;
      color: #475569;
    }
    .not-found span { font-size: 64px; display: block; margin-bottom: 12px; }
    .not-found p { font-size: 16px; }

    @media (max-width: 600px) {
      main { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./loader.tsx"></script>
</body>
</html>
