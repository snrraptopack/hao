<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auwla Event Chain Example</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1d2329;
      background: #f4f7f9;
      padding: 32px;
    }
    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }
    .panel,
    .activity {
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(37, 54, 68, 0.08);
    }
    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }
    input,
    button {
      height: 40px;
      border-radius: 6px;
      font: inherit;
    }
    input {
      border: 1px solid #c7d3dc;
      padding: 0 12px;
      min-width: 0;
    }
    button {
      border: 0;
      background: #126c77;
      color: #fff;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
    }
    button:hover { background: #0f5c66; }
    .tracker {
      margin-top: 16px;
      height: 180px;
      border: 1px dashed #9badb9;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(18, 108, 119, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(18, 108, 119, 0.08) 1px, transparent 1px),
        #f8fbfc;
      background-size: 18px 18px;
      display: grid;
      place-items: center;
      user-select: none;
    }
    .tracker span {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 18px;
      color: #31434f;
    }
    .save {
      margin-top: 16px;
      width: 140px;
    }
    .status {
      margin: 14px 0 0;
      color: #5e707c;
    }
    .activity h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .empty {
      color: #738592;
      margin: 0;
    }
    .entry {
      border-top: 1px solid #e3ebf0;
      padding: 10px 0;
      display: grid;
      gap: 2px;
    }
    .entry strong {
      color: #1d2329;
    }
    .entry span {
      color: #647783;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      body { padding: 18px; }
      .shell { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./event-chain.tsx"></script>
</body>
</html>
