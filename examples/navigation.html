<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auwla — Navigation API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    /* ── nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 24px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-size: 15px;
      font-weight: 700;
      color: #58a6ff;
      margin-right: 20px;
      letter-spacing: -0.02em;
    }

    /* Link component active classes */
    nav a {
      display: inline-flex;
      align-items: center;
      height: 56px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 500;
      color: #8b949e;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: #c9d1d9; }
    nav a.active { color: #c9d1d9; }
    nav a.exact-active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
    }

    /* ── layout ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 24px;
    }

    /* ── cards / sections ── */
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }

    h1 { font-size: 26px; font-weight: 700; color: #e6edf3; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 600; color: #e6edf3; margin-bottom: 12px; }
    p  { color: #8b949e; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }

    /* ── user list ── */
    .user-list { list-style: none; }
    .user-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #21262d;
    }
    .user-list li:last-child { border-bottom: none; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }
    .user-list a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .user-list a:hover { text-decoration: underline; }
    .role-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .role-admin  { background: #1f3a5f; color: #58a6ff; }
    .role-editor { background: #1f3a2f; color: #3fb950; }
    .role-viewer { background: #2d2a1f; color: #d29922; }

    /* ── back button ── */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #8b949e;
      text-decoration: none;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 20px;
      cursor: pointer;
      background: transparent;
      transition: color 0.15s, background 0.15s;
    }
    .back:hover { color: #c9d1d9; background: #21262d; }

    /* ── meta badge ── */
    .meta-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .meta-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: #21262d;
      color: #8b949e;
      letter-spacing: 0.04em;
    }

    /* ── protected page ── */
    .lock-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .center { text-align: center; }

    /* ── login form ── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #c9d1d9;
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #58a6ff; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 9px 16px;
      background: #238636;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #2ea043; }

    .not-found {
      text-align: center;
      padding: 80px 0;
    }
    .not-found .code { font-size: 72px; font-weight: 800; color: #21262d; }
    .not-found p { color: #8b949e; margin-top: 8px; }

    @media (max-width: 600px) { main { padding: 24px 16px; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./navigation.tsx"></script>
</body>
</html>
